github:
  features:
    # Enable issue management
    issues: true
  description: "ASF Infra CAP - Contingent Approval Provider"
  homepage: https://infra.apache.org/
  labels:
    - apache
    - selfserve
    - community
    - governance
  autolink_jira:
    - INFRA
notifications:
  jobs:         notifications@infra.apache.org
  jira_options: link label comment
  commits: commits@infra.apache.org
  issues: commits@infra.apache.org
  pullrequests: commits@infra.apache.org

github:
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
